name: Test

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
      - '*.md'
      - '.gitignore'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc -b

      - name: Run unit tests
        run: npm run test:run

      - name: Check for TypeScript errors
        run: |
          if [ $? -eq 0 ]; then
            echo "✓ No TypeScript errors found"
          else
            echo "✗ TypeScript errors found"
            exit 1
          fi

    permissions:
      contents: read
      checks: write
      pull-requests: write
