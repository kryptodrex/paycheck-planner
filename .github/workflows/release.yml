name: Production Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'

permissions:
  contents: write

jobs:
  promote-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version)" >> $GITHUB_OUTPUT

      - name: Build release notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Use a unique delimiter to avoid YAML conflicts
          {
            echo "CHANGELOG<<__END_CHANGELOG__"
            echo "## ✅ Release v${VERSION}"
            echo ""
            echo "### 📦 Platform Builds"
            echo "- **macOS**: Paycheck.Planner-${VERSION}-arm64.dmg (Apple Silicon), Paycheck.Planner-${VERSION}-x64.dmg (Intel)"
            echo "- **Windows**: Paycheck.Planner.${VERSION}.exe, Paycheck.Planner.Setup.${VERSION}.exe"
            echo "- **Linux**: Paycheck.Planner-${VERSION}.AppImage"
            echo ""
            if [ -f RELEASE_NOTES.md ]; then
              echo "### 🆕 What's New"
              echo ""
              cat RELEASE_NOTES.md
            else
              echo "### 🆕 What's New"
              echo ""
              echo "See the [full feature overview](https://github.com/${{ github.repository }}/blob/main/README.md) for details on everything Paycheck Planner can do."
            fi
            echo "__END_CHANGELOG__"
          } >> $GITHUB_OUTPUT

      - name: Promote to Production Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          make_latest: true
