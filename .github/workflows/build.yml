name: Build

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync version
        run: npm run sync-version

      - name: TypeScript compilation check
        run: npx tsc -b

      - name: Build renderer (Vite)
        run: npx vite build

    permissions:
      contents: read
      checks: write
